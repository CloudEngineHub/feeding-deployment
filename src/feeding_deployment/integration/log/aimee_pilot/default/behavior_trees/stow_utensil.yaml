name: StowUtensil
description: Place the utensil in the tool mount.
type: Behavior
parameters:
- name: Speed
  description: Speed of the robot during placing the utensil.
  is_user_editable: true
  space:
    type: Enum
    elements:
    - low
    - medium
    - high
  value: high
fn: !hla stow_utensil