name: EmulateTransfer
description: Bring the empty gripper in front of the user's mouth to facilitate recording
  or testing gestures.
type: Behavior
parameters:
- name: Speed
  description: Speed of the robot during emulated transfer.
  is_user_editable: true
  space:
    type: Enum
    elements:
    - low
    - medium
    - high
  value: medium
fn: !hla emulate_transfer