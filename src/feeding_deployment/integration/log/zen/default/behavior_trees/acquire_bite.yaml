name: AcquireBite
description: Pick up the appropriate food item from the plate.
type: Behavior
parameters:
- name: Speed
  description: Speed of the robot during bite acquisition.
  is_user_editable: true
  space:
    type: Enum
    elements:
    - low
    - medium
    - high
  value: medium
- name: TimeToWaitBeforeAutocontinue
  description: Time to wait before auto-continuing pickup bite button on the webapp.
  is_user_editable: true
  space:
    type: Box
    lower: 5.0
    upper: 100.0
  value: 5.0
- name: TransferAskForConfirmation
  description: Ask for confirmation on the web app before initiating the transfer
    sequence for a bite.
  is_user_editable: true
  space:
    type: Enum
    elements:
    - 0
    - 1
  value: 0
fn: !hla acquire_bite